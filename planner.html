<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Өдрийн Төлөв">
<meta name="theme-color" content="#F0F0F0">
<title>Өдрийн Төлөвлөгөө</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans','Segoe UI',sans-serif;background:#F0F0F0;color:#1A1A1A;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:16px}
button{cursor:pointer}
input:focus,select:focus{outline:none}

#app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}

/* SIDEBAR */
#sidebar{background:#E8E8E8;border-right:1px solid #D5D5D5;padding:20px 12px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
#logo{font-size:12px;font-weight:800;color:#E85D04;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:8px}
#sync-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;display:inline-block;flex-shrink:0}
#sync-dot.syncing{background:#F4A261;animation:blink 1s infinite}
#sync-dot.error{background:#E85D04}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.side-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin:14px 0 5px;padding:0 8px}

.nav-btn{width:100%;height:32px;padding:0 10px;border-radius:8px;border:none;background:transparent;color:#777;font-size:12px;font-weight:600;text-align:left;display:flex;align-items:center;justify-content:space-between;transition:all .15s;margin-bottom:2px;flex-shrink:0}
.nav-btn:hover{background:#DCDCDC;color:#333}
.nav-btn.active{background:#E85D04;color:#fff}
.nav-count{font-size:10px;background:rgba(0,0,0,.1);padding:1px 6px;border-radius:20px;flex-shrink:0}
.nav-btn.active .nav-count{background:rgba(255,255,255,.25)}

.filter-btn{width:100%;height:28px;padding:0 10px;border-radius:7px;border:none;background:transparent;color:#999;font-size:11px;font-weight:600;text-align:left;display:flex;align-items:center;gap:5px;transition:all .15s;margin-bottom:1px;cursor:pointer}
.filter-btn:hover{background:#DCDCDC;color:#555}
.filter-btn.active{background:rgba(26,26,26,.12);color:#1A1A1A;font-weight:700}

/* MAIN */
#main{display:flex;flex-direction:column;min-height:100vh}
#main-header{background:#E8E8E8;border-bottom:1px solid #D5D5D5;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
#day-title{font-size:20px;font-weight:800;color:#1A1A1A;letter-spacing:-.3px}
#day-subtitle{font-size:11px;color:#999;margin-top:2px}
#header-right{display:flex;align-items:center;gap:12px}
#progress-wrap{display:none;align-items:center;gap:8px}
#progress-bar-bg{width:110px;height:4px;background:#D0D0D0;border-radius:2px;overflow:hidden}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#E85D04,#F4A261);border-radius:2px;transition:width .4s}
#progress-text{font-size:12px;color:#999;font-weight:600}
#add-btn{padding:8px 16px;border-radius:9px;border:none;background:#E85D04;color:#fff;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(232,93,4,.25);white-space:nowrap}
#add-btn:hover{background:#D44D00}

#main-content{padding:20px 24px;flex:1}

.pri-section{margin-bottom:20px}
.pri-header{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pri-line{height:1px;flex:1;opacity:.25}
.pri-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}

.task-card{background:#fff;border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px;border:1px solid #E8E8E8;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .15s}
.task-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.task-card.dimmed{opacity:.45}
.status-btn{width:24px;height:24px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:800;background:transparent;transition:all .15s;cursor:pointer}
.status-btn:hover{transform:scale(1.1)}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:600;color:#1A1A1A;line-height:1.3}
.task-title.struck{text-decoration:line-through;color:#BBB}
.task-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.del-btn{background:none;border:none;color:#CCC;font-size:12px;padding:4px 6px;border-radius:6px;transition:all .15s;flex-shrink:0;cursor:pointer}
.del-btn:hover{background:#F5F5F5;color:#999}

#empty-state{text-align:center;padding:60px 20px;color:#CCC}
#empty-state .ei{font-size:40px;margin-bottom:10px}
#empty-state .et{font-size:14px;font-weight:600;margin-bottom:4px}

/* STATUS POPUP */
#status-overlay{position:fixed;inset:0;z-index:98;display:none}
#status-popup{position:fixed;z-index:99;background:#fff;border:1px solid #E0E0E0;border-radius:12px;padding:5px;box-shadow:0 8px 32px rgba(0,0,0,.12);min-width:190px;display:none}
.sp-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border-radius:8px;border:none;background:transparent;color:#666;font-size:13px;font-weight:500;text-align:left;cursor:pointer}
.sp-btn:hover{background:#F5F5F5}
.sp-btn.active{font-weight:700}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:#fff;border-radius:16px;padding:24px;width:420px;border:1px solid #E8E8E8;box-shadow:0 20px 60px rgba(0,0,0,.15)}
#modal h3{font-size:15px;font-weight:800;margin-bottom:16px;color:#1A1A1A}
.mf{margin-bottom:12px}
.ml{font-size:10px;color:#AAA;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
#modal input[type=text]{width:100%;background:#F7F7F7;border:1px solid #E8E8E8;border-radius:9px;color:#1A1A1A;padding:10px 13px;font-size:16px;transition:border .15s}
#modal input[type=text]:focus{border-color:#E85D04;background:#fff}
#modal select,#modal input[type=date]{background:#F7F7F7;border:1px solid #E8E8E8;border-radius:9px;color:#1A1A1A;padding:9px 12px;font-size:16px;width:100%}
#modal input[type=date]:focus,#modal select:focus{border-color:#E85D04;background:#fff;outline:none}
.pri-row{display:flex;gap:8px}
.pri-toggle{flex:1;padding:10px 6px;border-radius:9px;border:2px solid #E8E8E8;background:#F7F7F7;color:#AAA;font-size:12px;font-weight:800;text-align:center;line-height:1.4;transition:all .15s;cursor:pointer}
.pri-toggle.sel-must{border-color:#E85D04;background:#FFF5F0;color:#E85D04}
.pri-toggle.sel-nice{border-color:#0077B6;background:#F0F7FF;color:#0077B6}
.dt-row{display:flex;gap:8px}
.dt-row>*{flex:1}
.ma{display:flex;gap:8px;margin-top:16px}
#cancel-btn{flex:1;padding:11px;border-radius:9px;border:1px solid #E8E8E8;background:#F7F7F7;color:#999;font-size:13px;font-weight:700}
#save-btn{flex:2;padding:11px;border-radius:9px;border:none;background:#E85D04;color:#fff;font-size:13px;font-weight:800}

/* MOBILE */
@media(max-width:1024px){
  #app{display:block}
  #sidebar{position:static;height:auto;flex-direction:column;padding:6px 8px;border-right:none;border-bottom:1px solid #D5D5D5;overflow-y:visible}
  #logo{display:none}
  /* Day nav - horizontal scroll */
  #day-nav{display:flex;flex-direction:row;overflow-x:auto;gap:4px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .nav-btn{width:auto;height:28px;padding:0 10px;white-space:nowrap;flex-shrink:0;margin-bottom:0;font-size:11px}
  /* Filters - horizontal scroll rows */
  #biz-nav,#status-nav{display:flex;flex-direction:row;overflow-x:auto;gap:3px;padding:3px 0;-webkit-overflow-scrolling:touch}
  .filter-btn{width:auto;height:24px;padding:0 9px;white-space:nowrap;flex-shrink:0;margin-bottom:0;font-size:11px}
  .side-label{display:none}
  #past-input-wrap{display:none}
  #main{min-height:auto}
  #main-header{padding:8px 14px;position:static}
  #day-title{font-size:17px}
  #day-subtitle{font-size:11px}
  #add-btn{padding:7px 12px;font-size:12px}
  #main-content{padding:10px 14px}
  #modal{width:calc(100% - 20px);padding:18px 14px}
}
</style>
</head>
<body>
<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="logo">📋 Төлөвлөгөө <span id="sync-dot"></span></div>

  <div class="side-label">Өдөр</div>
  <div id="day-nav">
    <button class="nav-btn active" data-day="today"><span>Өнөөдөр</span><span class="nav-count" id="cnt-today"></span></button>
    <button class="nav-btn" data-day="tomorrow"><span>Маргааш</span><span class="nav-count" id="cnt-tomorrow"></span></button>
    <button class="nav-btn" data-day="future"><span>Хойш</span><span class="nav-count" id="cnt-future"></span></button>
    <button class="nav-btn" data-day="all"><span>Бүгд</span><span class="nav-count" id="cnt-all"></span></button>
    <button class="nav-btn" data-day="past" id="btn-past"><span>📅 Өнгөрсөн</span><span class="nav-count" id="cnt-past"></span></button>
  </div>
  <div id="past-input-wrap">
    <input type="date" id="past-date-input" style="margin-top:6px;width:100%;background:#F0F0F0;border:1px solid #D5D5D5;border-radius:8px;color:#1A1A1A;padding:6px 10px;font-size:13px">
  </div>

  <div class="side-label">Бизнесээр</div>
  <div id="biz-nav">
    <button class="filter-btn active" data-biz="all">🗂 Бүгд</button>
    <button class="filter-btn" data-biz="market-mn">🛒 Market.mn</button>
    <button class="filter-btn" data-biz="nova">📦 Nova</button>
    <button class="filter-btn" data-biz="market-shop">🏪 Market.shop</button>
    <button class="filter-btn" data-biz="bni">🤝 BNI</button>
    <button class="filter-btn" data-biz="personal">⭐ Хувийн</button>
  </div>

  <div class="side-label">Төлөвөөр</div>
  <div id="status-nav">
    <button class="filter-btn active" data-st="all">🗂 Бүгд</button>
    <button class="filter-btn" data-st="todo">○ Хийгдээгүй</button>
    <button class="filter-btn" data-st="inprogress">⏳ Хийгдэж байна</button>
    <button class="filter-btn" data-st="done">✓ Дууссан</button>
    <button class="filter-btn" data-st="onhold">⏸ Зогссон</button>
    <button class="filter-btn" data-st="cancelled">✕ Цуцлагдсан</button>
    <button class="filter-btn" data-st="moved">→ Шилжүүлсэн</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="main-header">
    <div>
      <div id="day-title">Өнөөдөр</div>
      <div id="day-subtitle"></div>
    </div>
    <div id="header-right">
      <div id="progress-wrap">
        <div id="progress-bar-bg"><div id="progress-bar"></div></div>
        <span id="progress-text"></span>
      </div>
      <button id="add-btn">＋ Нэмэх</button>
    </div>
  </div>

  <div id="main-content">
    <div id="empty-state" style="display:none">
      <div class="ei">📋</div>
      <div class="et">Даалгавар байхгүй</div>
      <div style="font-size:12px">Нэмэх товч дарна уу</div>
    </div>
    <div id="must-section" class="pri-section" style="display:none">
      <div class="pri-header">
        <div class="pri-line" style="background:#E85D04"></div>
        <span style="color:#E85D04">🔴 MUST HAVE</span>
        <span class="pri-badge" id="must-badge" style="background:#FFF0EB;color:#E85D04"></span>
        <div class="pri-line" style="background:#E85D04"></div>
      </div>
      <div id="must-list"></div>
    </div>
    <div id="nice-section" class="pri-section" style="display:none">
      <div class="pri-header">
        <div class="pri-line" style="background:#0077B6"></div>
        <span style="color:#0077B6">🔵 NICE TO HAVE</span>
        <span class="pri-badge" id="nice-badge" style="background:#EBF5FF;color:#0077B6"></span>
        <div class="pri-line" style="background:#0077B6"></div>
      </div>
      <div id="nice-list"></div>
    </div>
  </div>
</div>
</div>

<div id="status-overlay"></div>
<div id="status-popup"></div>

<div id="modal-overlay">
  <div id="modal">
    <h3>➕ Даалгавар нэмэх</h3>
    <div class="mf"><input type="text" id="task-input" placeholder="Даалгаварын нэр..."></div>
    <div class="mf">
      <div class="ml">Бизнес</div>
      <select id="cat-select">
        <option value="market-mn">🛒 Market.mn</option>
        <option value="nova">📦 Nova Distribution</option>
        <option value="market-shop">🏪 Market.shop</option>
        <option value="bni">🤝 BNI</option>
        <option value="personal" selected>⭐ Хувийн</option>
      </select>
    </div>
    <div class="mf">
      <div class="ml">Ач холбогдол</div>
      <div class="pri-row">
        <button class="pri-toggle sel-must" data-pri="must" id="btn-must">
          <div style="font-size:16px;margin-bottom:2px">🔴</div>
          <div>Must Have</div>
          <div style="font-size:10px;opacity:.6;font-weight:500">Заавал хийх</div>
        </button>
        <button class="pri-toggle" data-pri="nice" id="btn-nice">
          <div style="font-size:16px;margin-bottom:2px">🔵</div>
          <div>Nice to Have</div>
          <div style="font-size:10px;opacity:.6;font-weight:500">Хийвэл сайн</div>
        </button>
      </div>
    </div>
    <div class="mf">
      <div class="ml">Өдөр / Цаг</div>
      <div class="dt-row">
        <input type="date" id="task-date">
        <select id="task-time">
          <option value="">Цаг...</option>
          <option>06:00</option><option>07:00</option><option>08:00</option><option>09:00</option>
          <option>10:00</option><option>11:00</option><option>12:00</option><option>13:00</option>
          <option>14:00</option><option>15:00</option><option>16:00</option><option>17:00</option>
          <option>18:00</option><option>19:00</option><option>20:00</option><option>21:00</option>
        </select>
      </div>
    </div>
    <div class="ma">
      <button id="cancel-btn">Болих</button>
      <button id="save-btn">Нэмэх ✓</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = {apiKey:"AIzaSyCz3dGfv08g7iX6j7sMiZQrevHrcpaJ-GM",authDomain:"ganzorig-s-project.firebaseapp.com",projectId:"ganzorig-s-project",storageBucket:"ganzorig-s-project.firebasestorage.app",messagingSenderId:"288988145677",appId:"1:288988145677:web:7edadc55687420ca670d44"};
const db = getFirestore(initializeApp(FB));
const dataRef = doc(db, 'planner', 'ganzorig');

const CATS = {
  'market-mn':{label:'Market.mn',color:'#E85D04',icon:'🛒'},
  'nova':{label:'Nova Dist.',color:'#0077B6',icon:'📦'},
  'market-shop':{label:'Market.shop',color:'#2D6A4F',icon:'🏪'},
  'bni':{label:'BNI',color:'#9B2226',icon:'🤝'},
  'personal':{label:'Хувийн',color:'#6A0572',icon:'⭐'},
};
const STATUSES = [
  {v:'todo',     l:'Хийгдээгүй',    i:'○', c:'#CCC',    bg:'#fff',    br:'#E8E8E8'},
  {v:'inprogress',l:'Хийгдэж байна',i:'⏳',c:'#F4A261', bg:'#FFFAF5', br:'#F4D5B0'},
  {v:'done',     l:'Дууссан',        i:'✓', c:'#4CAF50', bg:'#F5FFF7', br:'#C8E6C9'},
  {v:'onhold',   l:'Түр зогссон',    i:'⏸',c:'#7B8CDE', bg:'#F5F6FF', br:'#C5CAF0'},
  {v:'cancelled',l:'Цуцлагдсан',     i:'✕', c:'#BBB',    bg:'#FAFAFA', br:'#E8E8E8'},
  {v:'moved',    l:'Шилжүүлсэн',     i:'→', c:'#9C6FD6', bg:'#FAF5FF', br:'#DDD0F0'},
];
const DAYS=['Ням','Даваа','Мягмар','Лхагва','Пүрэв','Баасан','Бямба'];
const MONTHS=['1-р сар','2-р сар','3-р сар','4-р сар','5-р сар','6-р сар','7-р сар','8-р сар','9-р сар','10-р сар','11-р сар','12-р сар'];

function dStr(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10);}
function fDate(s){const d=new Date(s+'T00:00:00');return`${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`;}
function getSt(v){return STATUSES.find(s=>s.v===v)||STATUSES[0];}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setSyncDot(s){const d=document.getElementById('sync-dot');d.className='';if(s)d.classList.add(s);}

// State
let tasks={}, selDay='today', selPastDate='', selBiz='all', selSt='all', selPri='must', openPopupId=null, saveTimer=null;

// Firebase
onSnapshot(dataRef, snap=>{
  if(snap.exists()) tasks=snap.data().tasks||{};
  setSyncDot(''); render();
});
function debSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    setSyncDot('syncing');
    try{await setDoc(dataRef,{tasks},{merge:true});setSyncDot('');}
    catch(e){setSyncDot('error');}
  },800);
}

// Get tasks for current view (unfiltered by biz/status)
function getViewTasks(){
  if(selDay==='today') return (tasks[dStr(0)]||[]).map(t=>({...t}));
  if(selDay==='tomorrow') return (tasks[dStr(1)]||[]).map(t=>({...t}));
  if(selDay==='past'){
    return (tasks[selPastDate]||[]).map(t=>({...t}));
  }
  if(selDay==='future'){
    // All dates from day+2 onwards
    const today=dStr(0), tom=dStr(1);
    const result=[];
    Object.entries(tasks).forEach(([date,arr])=>{
      if(date!==today&&date!==tom&&arr){
        arr.forEach(t=>result.push({...t,_date:date}));
      }
    });
    result.sort((a,b)=>(a._date||'').localeCompare(b._date||''));
    return result;
  }
  if(selDay==='all'){
    const result=[];
    const today=dStr(0), tom=dStr(1);
    (tasks[today]||[]).forEach(t=>result.push({...t}));
    (tasks[tom]||[]).forEach(t=>result.push({...t}));
    Object.entries(tasks).forEach(([date,arr])=>{
      if(date!==today&&date!==tom&&arr){
        arr.forEach(t=>result.push({...t,_date:date}));
      }
    });
    return result;
  }
  return [];
}

// Apply biz + status filters
function applyFilters(arr){
  let res=arr;
  if(selBiz!=='all') res=res.filter(t=>t.category===selBiz);
  if(selSt!=='all') res=res.filter(t=>(t.status||'todo')===selSt);
  return res;
}

// Count tasks per day tab (unfiltered)
function countForDay(day){
  if(day==='today') return tasks[dStr(0)]||[];
  if(day==='tomorrow') return tasks[dStr(1)]||[];
  if(day==='past') return selPastDate?(tasks[selPastDate]||[]):[];
  if(day==='future'){
    const today=dStr(0),tom=dStr(1);
    const r=[];
    Object.entries(tasks).forEach(([date,arr])=>{
      if(date!==today&&date!==tom&&arr) arr.forEach(t=>r.push(t));
    });
    return r;
  }
  if(day==='all'){
    const today=dStr(0),tom=dStr(1);
    const r=[...(tasks[today]||[]),(tasks[tom]||[])];
    Object.entries(tasks).forEach(([date,arr])=>{
      if(date!==today&&date!==tom&&arr) arr.forEach(t=>r.push(t));
    });
    return r;
  }
  return [];
}

function render(){
  // Day nav counts
  ['today','tomorrow','future','all','past'].forEach(day=>{
    const btn=document.querySelector(`[data-day="${day}"]`);
    if(!btn)return;
    btn.classList.toggle('active',selDay===day);
    const arr=countForDay(day);
    const done=arr.filter(t=>t.status==='done').length;
    const el=document.getElementById(`cnt-${day}`);
    if(el) el.textContent=arr.length?`${done}/${arr.length}`:'';
  });

  // Past date input visibility
  document.getElementById('past-input-wrap').style.display=selDay==='past'?'block':'none';

  // Biz filter active state
  document.querySelectorAll('[data-biz]').forEach(b=>b.classList.toggle('active',b.dataset.biz===selBiz));

  // Status filter active state
  document.querySelectorAll('[data-st]').forEach(b=>b.classList.toggle('active',b.dataset.st===selSt));

  renderMain();
}

function renderMain(){
  // Title
  const titles={today:'Өнөөдөр',tomorrow:'Маргааш',future:'Хойш',all:'Бүгд',past:'📅 Өнгөрсөн'};
  const subs={
    today:fDate(dStr(0)),
    tomorrow:fDate(dStr(1)),
    future:'Нөгөөдрөөс цааш бүх өдрүүд',
    all:'Өнөөдөр + Маргааш + Хойш',
    past:selPastDate?fDate(selPastDate):'Өдөр сонгоно уу',
  };
  document.getElementById('day-title').textContent=titles[selDay]||'';
  document.getElementById('day-subtitle').textContent=subs[selDay]||'';

  const rawAll=getViewTasks();
  const all=applyFilters(rawAll);
  const done=all.filter(t=>t.status==='done').length;

  // Progress
  const pw=document.getElementById('progress-wrap');
  if(all.length){
    pw.style.display='flex';
    const pct=Math.round(done/all.length*100);
    document.getElementById('progress-bar').style.width=pct+'%';
    document.getElementById('progress-bar').style.background=pct===100?'linear-gradient(90deg,#4CAF50,#81C784)':'linear-gradient(90deg,#E85D04,#F4A261)';
    document.getElementById('progress-text').textContent=`${done}/${all.length}`;
  }else pw.style.display='none';

  document.getElementById('empty-state').style.display=all.length?'none':'block';

  const mustT=all.filter(t=>t.priority==='must');
  const niceT=all.filter(t=>t.priority==='nice');
  // If status/biz filter but task has no priority, show all in must
  const restT=all.filter(t=>t.priority!=='must'&&t.priority!=='nice');
  const mustFinal=[...mustT,...restT];

  const ms=document.getElementById('must-section');
  if(mustFinal.length){
    ms.style.display='block';
    document.getElementById('must-badge').textContent=`${mustFinal.filter(t=>t.status==='done').length}/${mustFinal.length}`;
    document.getElementById('must-list').innerHTML=mustFinal.map(t=>taskHTML(t)).join('');
  }else ms.style.display='none';

  const ns=document.getElementById('nice-section');
  if(niceT.length){
    ns.style.display='block';
    document.getElementById('nice-badge').textContent=`${niceT.filter(t=>t.status==='done').length}/${niceT.length}`;
    document.getElementById('nice-list').innerHTML=niceT.map(t=>taskHTML(t)).join('');
  }else ns.style.display='none';
}

function taskHTML(t){
  const st=getSt(t.status||'todo');
  const cat=CATS[t.category]||CATS.personal;
  const dimmed=['done','cancelled','moved'].includes(t.status);
  const strk=['done','cancelled'].includes(t.status);
  const showDate=(selDay==='future'||selDay==='all')&&t._date;
  const dateTag=showDate?`<span class="tag" style="background:#F0F0F0;color:#999">📅 ${fDate(t._date)}</span>`:'';
  return`<div class="task-card${dimmed?' dimmed':''}" style="background:${st.bg};border-color:${st.br}">
    <button class="status-btn" style="border-color:${st.c};color:${st.c};background:${t.status==='todo'?'transparent':st.c+'18'}" onclick="openStatusPopup('${t.id}',event)">${st.i}</button>
    <div class="task-body">
      <div class="task-title${strk?' struck':''}">${esc(t.text)}</div>
      <div class="task-tags">
        <span class="tag" style="background:${cat.color}15;color:${cat.color}">${cat.icon} ${cat.label}</span>
        <span class="tag" style="background:${st.c}15;color:${st.c}">${st.l}</span>
        ${t.time?`<span class="tag" style="background:#F5F5F5;color:#AAA">🕐 ${t.time}</span>`:''}
        ${dateTag}
      </div>
    </div>
    <button class="del-btn" onclick="deleteTask('${t.id}')">✕</button>
  </div>`;
}

// Status popup
window.openStatusPopup=function(id,e){
  e.stopPropagation();
  if(openPopupId===id){closePopup();return;}
  openPopupId=id;
  const rect=e.currentTarget.getBoundingClientRect();
  // Find task across all dates
  let curTask=null;
  Object.values(tasks).forEach(arr=>{const f=arr.find(t=>t.id===id);if(f)curTask=f;});
  const popup=document.getElementById('status-popup');
  popup.innerHTML=STATUSES.map(s=>{
    const isAct=curTask&&curTask.status===s.v;
    return`<button class="sp-btn${isAct?' active':''}" style="${isAct?`background:${s.c}12;color:${s.c}`:''}" onclick="setStatus('${id}','${s.v}')">
      <span style="width:18px;text-align:center;color:${s.c}">${s.i}</span>${s.l}
      ${isAct?`<span style="margin-left:auto;color:${s.c};font-size:11px">✓</span>`:''}
    </button>`;
  }).join('');
  popup.style.left=Math.max(8,Math.min(rect.left,window.innerWidth-210))+'px';
  popup.style.top=Math.min(rect.bottom+4,window.innerHeight-280)+'px';
  popup.style.display='block';
  document.getElementById('status-overlay').style.display='block';
};
function closePopup(){openPopupId=null;document.getElementById('status-popup').style.display='none';document.getElementById('status-overlay').style.display='none';}

window.setStatus=function(id,status){
  Object.keys(tasks).forEach(d=>{tasks[d]=(tasks[d]||[]).map(t=>t.id===id?{...t,status}:t);});
  debSave();closePopup();render();
};
window.deleteTask=function(id){
  Object.keys(tasks).forEach(d=>{tasks[d]=(tasks[d]||[]).filter(t=>t.id!==id);});
  debSave();render();
};

// Modal
function openModal(){
  document.getElementById('task-input').value='';
  document.getElementById('cat-select').value='personal';
  document.getElementById('task-date').value=selDay==='past'&&selPastDate?selPastDate:dStr(0);
  document.getElementById('task-time').value='';
  selPri='must';updatePriUI();
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('task-input').focus(),100);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function updatePriUI(){
  document.getElementById('btn-must').className='pri-toggle'+(selPri==='must'?' sel-must':'');
  document.getElementById('btn-nice').className='pri-toggle'+(selPri==='nice'?' sel-nice':'');
}
function addTask(){
  const text=document.getElementById('task-input').value.trim();
  if(!text)return;
  const date=document.getElementById('task-date').value||dStr(0);
  const task={id:Date.now().toString(),text,status:'todo',category:document.getElementById('cat-select').value,priority:selPri,time:document.getElementById('task-time').value,date};
  if(!tasks[date])tasks[date]=[];
  tasks[date].push(task);
  debSave();closeModal();render();
}

// Event listeners
document.querySelectorAll('[data-day]').forEach(b=>b.addEventListener('click',()=>{
  selDay=b.dataset.day;
  render();
}));
document.getElementById('past-date-input').addEventListener('change',e=>{
  selPastDate=e.target.value;
  if(selPastDate) selDay='past';
  render();
});
document.querySelectorAll('[data-biz]').forEach(b=>b.addEventListener('click',()=>{selBiz=b.dataset.biz;render();}));
document.querySelectorAll('[data-st]').forEach(b=>b.addEventListener('click',()=>{selSt=b.dataset.st;render();}));
document.getElementById('add-btn').addEventListener('click',openModal);
document.getElementById('cancel-btn').addEventListener('click',closeModal);
document.getElementById('save-btn').addEventListener('click',addTask);
document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('status-overlay').addEventListener('click',closePopup);
document.querySelectorAll('[data-pri]').forEach(b=>b.addEventListener('click',()=>{selPri=b.dataset.pri;updatePriUI();}));
</script>
</body>
</html>
